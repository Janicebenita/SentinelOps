services:
  backend:
    build: {context: ., dockerfile: demo_app/Dockerfile}
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: [".:/workspace"]
    working_dir: /workspace
    ports: ["8000:8000"]
    environment: ["LLM_PROVIDER=mock", "DATABASE_URL=sqlite:///./data/sentinelops.db"]
  demo-app:
    build: {context: ., dockerfile: demo_app/Dockerfile}
    volumes: ["./data:/workspace/data"]
    ports: ["8001:8001"]
  frontend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes: ["./frontend:/app"]
    ports: ["5173:5173"]
    environment: ["VITE_API_URL=http://localhost:8000"]
