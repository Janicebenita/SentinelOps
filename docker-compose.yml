services:
  backend:
    build: {context: ., dockerfile: demo_app/Dockerfile}
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: [".:/workspace"]
    working_dir: /workspace
    ports: ["8000:8000"]
    environment: ["LLM_PROVIDER=mock", "DATABASE_URL=sqlite:///./data/sentinelops.db"]
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 3s
      timeout: 2s
      retries: 20
  demo-app:
    build: {context: ., dockerfile: demo_app/Dockerfile}
    volumes: ["./data:/workspace/data"]
    ports: ["8001:8001"]
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health').raise_for_status()"]
      interval: 3s
      timeout: 2s
      retries: 20
  frontend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes: ["./frontend:/app"]
    ports: ["5173:5173"]
    environment: ["VITE_API_URL=http://localhost:8000"]
    depends_on:
      backend: {condition: service_healthy}
      demo-app: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 2s
      retries: 30
