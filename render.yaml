services:
  - type: web
    name: janicebenita-sentinelops-api
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -e .
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: LLM_PROVIDER
        value: mock
      - key: DATABASE_URL
        value: sqlite:////tmp/sentinelops.db
      - key: DEMO_REPO_PATH
        value: .
      - key: DEMO_APP_URL
        value: https://janicebenita-sentinel-shop.onrender.com
      - key: CORS_ORIGINS
        value: https://janicebenita-sentinelops.onrender.com

  - type: web
    name: janicebenita-sentinel-shop
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -e .
    startCommand: uvicorn demo_app.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8

  - type: web
    name: janicebenita-sentinelops
    runtime: static
    branch: main
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: VITE_API_BASE_URL
        value: https://janicebenita-sentinelops-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
